[package]
name = "bitcoin-rs"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
version.workspace = true
authors.workspace = true
repository.workspace = true
description = "bitcoin-rs node binary"

[[bin]]
name = "bitcoin-rs"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
mimalloc.workspace = true
anyhow.workspace = true
bitcoin-rs-node = { path = "../../crates/node", default-features = false }

[features]
default = ["rocksdb", "fjall", "redb", "mdbx"]
rocksdb = ["bitcoin-rs-node/rocksdb"]
fjall = ["bitcoin-rs-node/fjall"]
redb = ["bitcoin-rs-node/redb"]
mdbx = ["bitcoin-rs-node/mdbx"]
kernel = ["bitcoin-rs-node/kernel"]
utreexo = ["bitcoin-rs-node/utreexo"]
